<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192" width="192" height="192">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2d5a3d;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1f3d2a;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="192" height="192" fill="url(#bgGradient)" rx="32"/>

  <!-- House silhouette -->
  <g fill="none" stroke="#ffffff" stroke-width="6" stroke-linecap="round" stroke-linejoin="round">
    <!-- Roof (triangle) -->
    <path d="M 35 115 L 96 35 L 157 115"/>

    <!-- Walls (house body) -->
    <path d="M 50 115 L 50 155 Q 50 165 60 165 L 132 165 Q 142 165 142 155 L 142 115 Z"/>

    <!-- Door -->
    <rect x="80" y="135" width="32" height="30" rx="3"/>
    <circle cx="108" cy="150" r="2" fill="#ffffff"/>

    <!-- Left window -->
    <rect x="55" y="80" width="18" height="18" rx="2"/>

    <!-- Right window -->
    <rect x="119" y="80" width="18" height="18" rx="2"/>
  </g>

  <!-- Financial chart indicator -->
  <g fill="none" stroke="#E8A020" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
    <polyline points="45,160 58,148 70,157 83,142 96,152 109,135"/>
  </g>

  <!-- Accent dot -->
  <circle cx="158" cy="32" r="10" fill="#E8A020" opacity="0.9"/>
</svg>
